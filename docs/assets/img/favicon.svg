<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Gear background -->
  <circle cx="32" cy="32" r="30" fill="#1c2128"/>
  <!-- Gear teeth small -->
  <g fill="#f97316">
    <rect x="28" y="2" width="8" height="10" rx="2"/>
    <rect x="28" y="52" width="8" height="10" rx="2"/>
    <rect x="52" y="28" width="10" height="8" rx="2"/>
    <rect x="2" y="28" width="10" height="8" rx="2"/>
    <g transform="translate(32,32) rotate(45) translate(-32,-32)">
      <rect x="28" y="2" width="8" height="10" rx="2"/>
      <rect x="28" y="52" width="8" height="10" rx="2"/>
      <rect x="52" y="28" width="10" height="8" rx="2"/>
      <rect x="2" y="28" width="10" height="8" rx="2"/>
    </g>
  </g>
  <circle cx="32" cy="32" r="26" fill="#0d1117" stroke="#f97316" stroke-width="2"/>
  <!-- Gibbon face simplified -->
  <ellipse cx="32" cy="34" rx="16" ry="17" fill="#3d2b22"/>
  <ellipse cx="32" cy="37" rx="11" ry="10" fill="#f5e6d3"/>
  <!-- Eyes -->
  <circle cx="27" cy="33" r="4" fill="#0d1117"/>
  <circle cx="28" cy="32" r="1.5" fill="white"/>
  <circle cx="37" cy="33" r="4" fill="#0d1117"/>
  <circle cx="38" cy="32" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="39" rx="3" ry="2" fill="#c4a882"/>
  <!-- Smile -->
  <path d="M27 44 Q32 48 37 44" stroke="#8a6040" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Small center gear -->
  <circle cx="32" cy="21" r="5" fill="#f97316" opacity="0.9"/>
  <circle cx="32" cy="21" r="2.5" fill="#0d1117"/>
</svg>
