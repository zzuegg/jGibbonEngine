name: 'Setup Screenshot Test Environment'
description: 'Installs Mesa, Slang, configures Vulkan ICD for screenshot testing'

runs:
  using: 'composite'
  steps:
    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
        cache: gradle

    - name: Setup GraalVM 26 EA (for GraalWasm modules)
      shell: bash
      run: |
        # Install GraalVM 26 EA via SDKMAN for the separate GraalWasm toolchain.
        # Gradle auto-detects it via JVM_TOOLCHAIN_PATHS.
        curl -s "https://get.sdkman.io" | bash
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        sdk install java 26.ea.13-graal || true
        GRAAL_HOME="$HOME/.sdkman/candidates/java/26.ea.13-graal"
        if [ ! -d "$GRAAL_HOME" ]; then
          echo "::warning::GraalVM 26 EA not available via SDKMAN, trying latest EA"
          LATEST=$(sdk list java 2>/dev/null | grep -oP '\d+\.ea\.\d+-graal' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sdk install java "$LATEST" || true
            GRAAL_HOME="$HOME/.sdkman/candidates/java/$LATEST"
          fi
        fi
        if [ -d "$GRAAL_HOME" ]; then
          echo "GraalVM installed at: $GRAAL_HOME"
          echo "ORG_GRADLE_PROJECT_org.gradle.java.installations.paths=$GRAAL_HOME" >> $GITHUB_ENV
        else
          echo "::warning::GraalVM 26 EA not available, GraalWasm tests will be skipped"
        fi

    - name: Grant Gradle wrapper execute permission
      shell: bash
      run: chmod +x gradlew

    - name: Install Mesa and virtual display
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          mesa-utils libegl-mesa0 libgl1-mesa-dri libglx-mesa0 \
          libvulkan1 mesa-vulkan-drivers xvfb libjemalloc2

    - name: Install Binaryen (wasm-as)
      shell: bash
      run: |
        # Need Binaryen >= 129 for GC/reference-types support required by GraalVM 26.
        # The apt package is too old.
        BINARYEN_VERSION=129
        curl -sL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
          | tar xz -C /tmp/
        echo "/tmp/binaryen-version_${BINARYEN_VERSION}/bin" >> $GITHUB_PATH
        echo "Binaryen version: $(/tmp/binaryen-version_${BINARYEN_VERSION}/bin/wasm-as --version)"

    - name: Configure Vulkan ICD
      shell: bash
      run: |
        ls /usr/share/vulkan/icd.d/ 2>/dev/null || echo "No ICD directory"
        for icd in \
          /usr/share/vulkan/icd.d/lvp_icd.x86_64.json \
          /usr/share/vulkan/icd.d/lvp_icd.json \
          /etc/vulkan/icd.d/lvp_icd.x86_64.json; do
          if [ -f "$icd" ]; then
            echo "Found Vulkan ICD: $icd"
            echo "VK_ICD_FILENAMES=$icd" >> $GITHUB_ENV
            echo "VK_DRIVER_FILES=$icd" >> $GITHUB_ENV
            break
          fi
        done

    - name: Download Slang compiler
      shell: bash
      run: |
        SLANG_VERSION="2026.5.2"
        SLANG_URL="https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz"
        curl -sL "$SLANG_URL" | tar xz -C tools/
        ls tools/lib/libslang.so && echo "Slang libraries found"
        ls tools/bin/slangc && echo "slangc found"
