name: Regenerate CI Reference Screenshots

on:
  workflow_dispatch:
    inputs:
      scene:
        description: 'Scene filter (empty = all scenes)'
        required: false
        default: ''

permissions:
  contents: write

env:
  LIBGL_ALWAYS_SOFTWARE: "1"
  MESA_GL_VERSION_OVERRIDE: "4.5"
  MESA_GLSL_VERSION_OVERRIDE: "450"
  GALLIUM_DRIVER: llvmpipe
  VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - run: chmod +x gradlew

      - name: Install Mesa and virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-utils libegl-mesa0 libgl1-mesa-dri libglx-mesa0 \
            libvulkan1 mesa-vulkan-drivers xvfb libjemalloc2

      - name: Download Slang compiler
        run: |
          SLANG_VERSION="2026.5.2"
          SLANG_URL="https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz"
          mkdir -p tools/bin tools/lib
          curl -sL "$SLANG_URL" | tar xz -C tools/ --strip-components=1

      - name: Generate CI reference screenshots
        run: |
          FILTER_ARG=""
          if [ -n "${{ inputs.scene }}" ]; then
            FILTER_ARG="-Pscreenshot.scene=${{ inputs.scene }}"
          fi
          xvfb-run -a -s "-screen 0 1280x720x24" \
            ./gradlew :samples:tests:screenshot:desktop-runner:saveReferences \
            -Pscreenshot.profile=ci $FILTER_ARG --no-daemon

      - name: Commit updated references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/tests/screenshot/references/ci/
          if git diff --cached --quiet; then
            echo "No changes to reference screenshots"
          else
            SCENE_MSG=""
            if [ -n "${{ inputs.scene }}" ]; then
              SCENE_MSG=" (scene: ${{ inputs.scene }})"
            fi
            git commit -m "ci: regenerate CI reference screenshots${SCENE_MSG}"
            git push
          fi
