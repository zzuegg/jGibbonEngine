name: Screenshot Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LIBGL_ALWAYS_SOFTWARE: "1"
  MESA_GL_VERSION_OVERRIDE: "4.5"
  MESA_GLSL_VERSION_OVERRIDE: "450"
  GALLIUM_DRIVER: llvmpipe

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - run: chmod +x gradlew

      - name: Install Mesa and virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-utils libegl-mesa0 libgl1-mesa-dri libglx-mesa0 \
            libvulkan1 mesa-vulkan-drivers xvfb libjemalloc2

      - name: Configure Vulkan ICD
        run: |
          ls /usr/share/vulkan/icd.d/ 2>/dev/null || echo "No ICD directory"
          for icd in \
            /usr/share/vulkan/icd.d/lvp_icd.x86_64.json \
            /usr/share/vulkan/icd.d/lvp_icd.json \
            /etc/vulkan/icd.d/lvp_icd.x86_64.json; do
            if [ -f "$icd" ]; then
              echo "Found Vulkan ICD: $icd"
              echo "VK_ICD_FILENAMES=$icd" >> $GITHUB_ENV
              echo "VK_DRIVER_FILES=$icd" >> $GITHUB_ENV
              break
            fi
          done

      - name: Download Slang compiler
        run: |
          SLANG_VERSION="2026.5.2"
          SLANG_URL="https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz"
          curl -sL "$SLANG_URL" | tar xz -C tools/
          ls tools/lib/libslang.so && echo "Slang libraries found"
          ls tools/bin/slangc && echo "slangc found"

      - name: Run screenshot pipeline
        id: pipeline
        continue-on-error: true
        run: |
          xvfb-run -a -s "-screen 0 1280x720x24" \
            ./gradlew :samples:tests:screenshot:analysis:screenshotTest \
            -Pscreenshot.profile=ci --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-report
          path: |
            build/screenshots/screenshot-report.json
            build/screenshots/report.html
            build/screenshots/**/*.png
          retention-days: 30

      - name: Fail on regression
        if: steps.pipeline.outcome == 'failure'
        run: exit 1

  # On main push: commit the screenshot report JSON for the website
  publish-report:
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: screenshot-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-report
          path: build/screenshots/

      - name: Commit screenshot report
        run: |
          mkdir -p docs/regression-tests
          cp build/screenshots/screenshot-report.json docs/regression-tests/screenshot-report.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/regression-tests/screenshot-report.json
          if git diff --cached --quiet; then
            echo "No changes to screenshot report"
          else
            git commit -m "ci: update screenshot test report [skip ci]"
            git push
          fi
