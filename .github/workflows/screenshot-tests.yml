name: Screenshot Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LIBGL_ALWAYS_SOFTWARE: "1"
  MESA_GL_VERSION_OVERRIDE: "4.5"
  MESA_GLSL_VERSION_OVERRIDE: "450"
  GALLIUM_DRIVER: llvmpipe

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-screenshot-env

      - name: Run screenshot pipeline
        id: pipeline
        continue-on-error: true
        run: |
          xvfb-run -a -s "-screen 0 1280x720x24" \
            ./gradlew :samples:tests:screenshot:analysis:screenshotTest \
            -Pscreenshot.profile=ci -Pscreenshot.web=true -Pscreenshot.graalwasm=true --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-report
          path: |
            build/screenshots/screenshot-report.json
            build/screenshots/report.html
            build/screenshots/**/*.png
            build/screenshots/**/*.txt
          retention-days: 30

      - name: Fail on regression
        if: steps.pipeline.outcome == 'failure'
        run: exit 1

  publish-report:
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: screenshot-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-report
          path: build/screenshots/

      - name: Commit screenshot report
        run: |
          mkdir -p docs/regression-tests
          cp build/screenshots/screenshot-report.json docs/regression-tests/screenshot-report.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/regression-tests/screenshot-report.json
          if git diff --cached --quiet; then
            echo "No changes to screenshot report"
          else
            git commit -m "ci: update screenshot test report [skip ci]"
            git push
          fi
