name: Screenshot Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  web-screenshot-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Compile and build web test app
        id: build
        run: |
          set +e
          ./gradlew :samples:tests:screenshot:web:assembleWebTest --no-daemon --stacktrace 2>&1 | tee build.log
          BUILD_EXIT=$?
          set -e
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Post build error to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('build.log', 'utf8');
            const lines = log.split('\n');
            const last80 = lines.slice(-80).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Build Failed\n\`\`\`\n${last80}\n\`\`\``
            });

      - name: Run web screenshot tests
        if: success()
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: ./gradlew :samples:tests:screenshot:web:test --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload web screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-screenshots
          path: samples/tests/screenshot/web/build/screenshots/
          retention-days: 30
          if-no-files-found: ignore
