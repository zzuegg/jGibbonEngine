name: Screenshot Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: screenshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      MESA_GL_VERSION_OVERRIDE: "4.5"
      MESA_GLSL_VERSION_OVERRIDE: "450"
      GALLIUM_DRIVER: llvmpipe
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Install Mesa software rendering and virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-utils \
            libegl-mesa0 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            libvulkan1 \
            mesa-vulkan-drivers \
            xvfb \
            libjemalloc2

      - name: Run screenshot pipeline
        continue-on-error: true
        run: |
          xvfb-run -a -s "-screen 0 1280x720x24" \
            ./gradlew :samples:tests:screenshot:analysis:report \
            -Pscreenshot.profile=ci --no-daemon 2>&1

      - name: Upload screenshot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-report
          path: |
            build/screenshots/report.html
            build/screenshots/manifest.json
            build/screenshots/**/*.png
          retention-days: 30

      - name: Check for regressions
        run: |
          xvfb-run -a ./gradlew :samples:tests:screenshot:analysis:failOnRegression \
            -Pscreenshot.profile=ci --no-daemon 2>&1
