<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine - WebGPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <script>
        // Check WebGPU support before loading the engine
        if (!navigator.gpu) {
            document.getElementById('status').textContent =
                'WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+.';
        } else {
            // Resize canvas to match actual display size
            var canvas = document.getElementById('canvas');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }
    </script>
    <script src="web.js"></script>
    <script type="module">
        // Load Slang WASM compiler, then start Java main
        import SlangModule from './slang/slang-wasm.mjs';

        var statusEl = document.getElementById('status');

        try {
            statusEl.textContent = 'Loading Slang WASM compiler...';
            var slangModule = await SlangModule({
                locateFile: function(path) {
                    if (path.endsWith('.wasm')) {
                        return 'slang/slang-wasm.wasm';
                    }
                    return path;
                }
            });
            window._slangModule = slangModule;
            console.log('Slang WASM loaded:', slangModule.getVersionString());
            statusEl.textContent = 'Slang loaded. Starting engine...';
        } catch (err) {
            console.error('Failed to load Slang WASM:', err);
            statusEl.textContent = 'Slang WASM failed: ' + err.message + ' (falling back to hardcoded shaders)';
            // Continue anyway — WebMain will detect isAvailable() == false
        }

        // Start the TeaVM main
        var mainFn = window.main || self.main;
        if (typeof mainFn === 'function') {
            mainFn();
        } else {
            statusEl.textContent =
                'Error: main() not found. Check console for details.';
            console.error('Available globals:', Object.keys(window).filter(function(k) {
                return k.includes('main') || k.includes('rt');
            }));
        }
    </script>
</body>
</html>
