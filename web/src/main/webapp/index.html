<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine - WebGPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <script>
        // Check WebGPU support before loading the engine
        if (!navigator.gpu) {
            document.getElementById('status').textContent =
                'WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+.';
        } else {
            // Resize canvas to match actual display size
            var canvas = document.getElementById('canvas');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }
    </script>
    <script src="web.js"></script>
    <script>
        // TeaVM assigns main to `this` (window/self) via the module wrapper
        // Try several ways to find it
        var mainFn = this.main || window.main || self.main;
        if (typeof mainFn === 'function') {
            mainFn();
        } else {
            document.getElementById('status').textContent =
                'Error: main() not found. Check console for details.';
            console.error('Available globals:', Object.keys(window).filter(k => k.includes('main') || k.includes('rt')));
        }
    </script>
</body>
</html>
